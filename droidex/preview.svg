  <text x="460" y="226" font-family="ui-monospace,monospace" font-size="11" letter-spacing="6" fill="#677082">TIERS UNLOCKED</text>
  <text x="460" y="296" font-family="system-ui,sans-serif" font-weight="800" font-size="64" fill="#e7e2d6">250</text>
  <text x="566" y="296" font-family="ui-monospace,monospace" font-size="20" fill="#677082">/250</text>

  <!-- card 3: CPS -->
