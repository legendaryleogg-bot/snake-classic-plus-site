  <text x="84" y="296" font-family="system-ui,sans-serif" font-weight="800" font-size="64" fill="#e7e2d6">50</text>
  <text x="168" y="296" font-family="ui-monospace,monospace" font-size="20" fill="#677082">/50</text>

  <!-- card 2: Tiers -->
