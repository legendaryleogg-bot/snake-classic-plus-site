  <text x="64" y="570" font-family="ui-monospace,monospace" font-size="13" letter-spacing="2" fill="#677082">FORTNITE · STAR WARS ISLAND · COMMUNITY TRACKER</text>
  <text x="1136" y="570" text-anchor="end" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#39455a">50 DROIDS · 250 TIERS</text>
