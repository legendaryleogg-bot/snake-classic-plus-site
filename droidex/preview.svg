  <circle cx="96" cy="490" r="8" fill="#8a94a0"/>
  <text x="114" y="495" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#8a94a0">DEFAULT</text>
  <circle cx="248" cy="490" r="8" fill="#e8b339"/>
  <text x="266" y="495" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#e8b339">GOLD</text>
  <circle cx="376" cy="490" r="8" fill="#7fd7e8"/>
  <text x="394" y="495" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#7fd7e8">DIAMOND</text>
  <circle cx="534" cy="490" r="8" fill="#d98fd6"/>
  <text x="552" y="495" font-family="ui-monospace,monospace" font-size="13" letter-spacing="1" fill="#d98fd6">RAINBOW</text>
