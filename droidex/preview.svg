<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="85%" cy="-5%" r="60%"><stop offset="0%" stop-color="#e8b339" stop-opacity=".15"/><stop offset="100%" stop-color="#0e1218" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="0%" cy="110%" r="55%"><stop offset="0%" stop-color="#37d9cf" stop-opacity=".1"/><stop offset="100%" stop-color="#0e1218" stop-opacity="0"/></radialGradient>
    <radialGradient id="orb" cx="38%" cy="35%" r="60%"><stop offset="0%" stop-color="#e8b339"/><stop offset="100%" stop-color="#b8861f"/></radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#b8861f"/><stop offset="100%" stop-color="#e8b339"/></linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0e1218"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- subtle grid lines -->
