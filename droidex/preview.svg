  <rect x="280" y="388" width="180" height="34" rx="8" fill="#1d2530" stroke="#39455a" stroke-width="1"/>
  <text x="370" y="410" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" letter-spacing="2" fill="#9aa3b0">WHAT'S NEXT</text>

  <rect x="476" y="388" width="200" height="34" rx="8" fill="#1d2530" stroke="#39455a" stroke-width="1"/>
  <text x="576" y="410" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" letter-spacing="2" fill="#9aa3b0">INCOME TRACKER</text>

  <rect x="692" y="388" width="180" height="34" rx="8" fill="#1d2530" stroke="#39455a" stroke-width="1"/>
  <text x="782" y="410" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" letter-spacing="2" fill="#9aa3b0">PROGRESS SYNC</text>

